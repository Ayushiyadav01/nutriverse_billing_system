version: '3'

services:
  backend:
    build: ./ntrv_server
    container_name: nutriverse-backend
    ports:
      - "8000:8000"
    volumes:
      - ./ntrv_server:/app
      - ./data:/app/data
    environment:
      - SQLITE_DB_PATH=/app/data/nutriverse.db
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./ntrv_frontend
    container_name: nutriverse-frontend
    depends_on:
      - backend
    ports:
      - "8501:8501"
    volumes:
      - ./ntrv_frontend:/app
    environment:
      - API_URL=http://backend:8000/api
    command: streamlit run streamlit_app.py --server.port=8501 --server.address=0.0.0.0

volumes:
  data:

